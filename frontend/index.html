<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEW Call Intelligence</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --header-bg: #141414;
            --bubble-user: #1a1a1a;
            --bubble-ai: #111111;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent-amber: #ffb300;
            --accent-green: #4caf50;
            --accent-red: #f44336;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            background-color: var(--header-bg);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .logo {
            font-weight: bold;
            letter-spacing: 1px;
            font-family: 'Courier New', Courier, monospace;
        }

        .status {
            display: flex;
            align-items: center;
            font-size: 12px;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            background-color: var(--text-muted);
        }

        .status-dot.online { background-color: var(--accent-green); }
        .status-dot.offline { background-color: var(--accent-red); }

        /* Chat Area */
        #chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }

        #chat-area::-webkit-scrollbar {
            width: 6px;
        }

        #chat-area::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 3px;
        }

        /* Message Bubbles */
        .message {
            max-width: 85%;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.5;
            position: relative;
        }

        .message-user {
            align-self: flex-end;
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .message-ai {
            align-self: flex-start;
            background-color: var(--bubble-ai);
            border: 1px solid var(--border-color);
            font-family: 'Courier New', Courier, monospace;
            width: 100%;
        }

        .answer-text {
            margin-bottom: 12px;
            white-space: pre-wrap;
        }

        .intent-badge {
            display: inline-block;
            margin-bottom: 10px;
            padding: 4px 8px;
            border: 1px solid #444;
            border-radius: 999px;
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .insight-headline {
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
        }

        .calls-referenced-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }

        .follow-ups-container {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #222;
        }

        .follow-up-label {
            margin-bottom: 10px;
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .follow-up-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .follow-up-chip {
            background-color: transparent;
            border: 1px solid #444;
            color: var(--text-main);
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
        }

        .follow-up-chip:hover {
            border-color: #777;
            background-color: #1a1a1a;
        }

        /* Confidence Bar */
        .confidence-container {
            margin-bottom: 10px;
        }

        .confidence-label {
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .confidence-bar-bg {
            height: 3px;
            background-color: #222;
            width: 100px;
            border-radius: 2px;
        }

        .confidence-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease-out;
        }

        /* Evidence Section */
        .evidence-header {
            margin-top: 15px;
            border-top: 1px solid #222;
            padding-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .subtitle {
            font-size: 11px;
            color: var(--text-muted);
        }

        .view-sources-btn {
            background: transparent;
            border: 1px solid #444;
            color: #ccc;
            padding: 4px 8px;
            font-size: 10px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .view-sources-btn:hover {
            border-color: #666;
            color: white;
        }

        .evidence-list {
            display: none;
            margin-top: 10px;
            gap: 8px;
            flex-direction: column;
        }

        .evidence-list.active {
            display: flex;
        }

        .evidence-item {
            padding: 8px;
            background-color: #151515;
            border-radius: 4px;
            border-left: 2px solid var(--accent-amber);
        }

        .evidence-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .call-id-badge {
            font-size: 9px;
            color: var(--accent-amber);
            background: rgba(255, 179, 0, 0.1);
            padding: 1px 4px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .evidence-timestamp {
            font-size: 9px;
            color: var(--text-muted);
        }

        .evidence-quote {
            font-size: 11px;
            font-style: italic;
            color: #bbbbbb;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        /* Loading Dots */
        .loading-dots {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 10px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        /* Input Area */
        .bottom-container {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-color);
        }

        .chips-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .chip {
            background-color: transparent;
            border: 1px solid #444;
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip:hover {
            border-color: #777;
            color: white;
            background-color: #1a1a1a;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            background-color: #1a1a1a;
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px 15px;
            border-radius: 6px;
            font-family: sans-serif;
            font-size: 14px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #555;
        }

        button#send-btn {
            background-color: white;
            color: black;
            border: none;
            padding: 0 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button#send-btn:hover {
            opacity: 0.9;
        }

        button#send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">GEW CALL INTELLIGENCE</div>
        <div class="status">
            <div id="status-dot" class="status-dot"></div>
            <span id="status-text">Checking API...</span>
        </div>
    </header>

    <main id="chat-area"></main>

    <div class="bottom-container">
        <div class="chips-container">
            <button class="chip" onclick="sendQuickQuery('Which counselor performs best')">Which counselor performs best</button>
            <button class="chip" onclick="sendQuickQuery('Why are leads dropping')">Why are leads dropping</button>
            <button class="chip" onclick="sendQuickQuery('What objections happen most')">What objections happen most</button>
            <button class="chip" onclick="sendQuickQuery('Which calls had no human interaction')">Which calls had no human interaction</button>
        </div>
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Type a strategic question..." autocomplete="off">
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chat-area');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        const API_URL = 'http://localhost:8000';

        // Check Health
        async function checkHealth() {
            try {
                const res = await fetch(`${API_URL}/health`);
                if (res.ok) {
                    statusDot.classList.add('online');
                    statusText.innerText = 'API Connected';
                } else {
                    throw new Error();
                }
            } catch (e) {
                statusDot.classList.add('offline');
                statusText.innerText = 'API Offline';
            }
        }

        checkHealth();

        // Send Message
        async function sendMessage() {
            const question = userInput.value.trim();
            if (!question) return;

            // Clear input and disable
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            // Add User Message
            addMessage(question, 'user');

            // Add Loading
            const loadingId = addLoading();
            scrollToBottom();

            try {
                const response = await fetch(`${API_URL}/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });

                const data = await response.json();
                removeLoading(loadingId);

                if (response.ok) {
                    addAnswerMessage(data);
                } else {
                    addMessage(`Error: ${data.detail || 'Internal Server Error'}`, 'ai');
                }
            } catch (e) {
                removeLoading(loadingId);
                addMessage(`Connection failed: Could not reach API at ${API_URL}`, 'ai');
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
                scrollToBottom();
            }
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message message-${type}`;
            div.innerText = text;
            chatArea.appendChild(div);
            return div;
        }

        function addLoading() {
            const div = document.createElement('div');
            div.className = 'loading-dots';
            div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            div.id = 'loading-' + Date.now();
            chatArea.appendChild(div);
            return div.id;
        }

        function removeLoading(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function addAnswerMessage(data) {
            const div = document.createElement('div');
            div.className = 'message message-ai';
            
            const confidence = data.confidence || 0;
            let confText = 'Low confidence';
            let confColor = 'var(--accent-red)';
            
            if (confidence > 0.7) {
                confText = 'High confidence';
                confColor = 'var(--accent-green)';
            } else if (confidence > 0.4) {
                confText = 'Moderate confidence';
                confColor = 'var(--accent-amber)';
            }

            const intent = data.intent || 'casual';
            const intentDisplay = intent.replace('_', ' ');
            const answer = (data.answer || 'No answer generated.').trim();
            const insight = (data.insight || '').trim();
            const isGeminiUnavailable = /gemini client not initialized/i.test(answer);
            const displayHeadline = insight && insight.toLowerCase() !== answer.toLowerCase()
                ? insight
                : 'Intelligence Insight';
            const displayAnswer = isGeminiUnavailable
                ? 'The backend is running, but the Gemini client was not initialized. Restart the API after loading your .env so the key is available at startup.'
                : answer;

            let html = `
                <div class="intent-badge intent-${intent}">${intentDisplay}</div>
                <div class="insight-headline">${displayHeadline}</div>
                <div class="answer-text">${displayAnswer}</div>
                <div class="confidence-label" style="color: ${confColor}">
                    ● ${confText} (${Math.round(confidence * 100)}%)
                </div>
            `;

            // Calls Referenced
            if (data.calls_referenced && data.calls_referenced.length > 0) {
                html += '<div class="calls-referenced-container">';
                data.calls_referenced.forEach(id => {
                    html += `<span class="call-id-badge">${id}</span>`;
                });
                html += '</div>';
            }

            // Follow-up suggestions
            if (data.follow_up_suggestions && data.follow_up_suggestions.length > 0) {
                html += `
                    <div class="follow-ups-container">
                        <div class="follow-up-label">Ask next →</div>
                        <div class="follow-up-chips">
                            ${data.follow_up_suggestions.map(s => `
                                <button class="follow-up-chip" onclick="sendQuickQuery('${s.replace(/'/g, "\\'")}')">${s}</button>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            div.innerHTML = html;
            chatArea.appendChild(div);
        }

        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function sendQuickQuery(text) {
            userInput.value = text;
            sendMessage();
        }

        // Listeners
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
